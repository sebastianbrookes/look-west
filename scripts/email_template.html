<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>Look West — Sunset Alert</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }

    /* Dark mode overrides — keep our warm palette */
    @media (prefers-color-scheme: dark) {
      .body-bg { background-color: #3a2a1e !important; }
      .card-bg { background-color: #3a2a1e !important; }
      .brand-text { color: #e8c4a0 !important; }
      .message-text { color: #f0e0d0 !important; }
      .meta-text { color: #c4967a !important; }
      .footer-text { color: #8b7060 !important; }
      .divider { background-color: #4a3728 !important; }
      .pill-bg { background-color: #4a3728 !important; }
      .pill-text { color: #d4a880 !important; }
    }

    /* Mobile adjustments */
    @media only screen and (max-width: 520px) {
      .card-inner { padding-left: 24px !important; padding-right: 24px !important; }
      .hero-img { height: 180px !important; }
      .brand-text { font-size: 20px !important; }
      .message-text { font-size: 16px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #fdf8f4; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">

  <!-- Preheader (hidden preview text) -->
  <div style="display: none; max-height: 0; overflow: hidden; font-size: 1px; line-height: 1px; color: #fdf8f4;">
    Sunset at {{sunset_time}} in {{location}} &#127749;
    &#8199;&#65279;&#847; &#8199;&#65279;&#847; &#8199;&#65279;&#847; &#8199;&#65279;&#847; &#8199;&#65279;&#847;
  </div>

  <!-- Outer wrapper -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="body-bg" style="background-color: #fdf8f4;">
    <tr>
      <td align="center" class="card-wrapper" style="padding: 0;">

        <!-- Main card -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="
          max-width: 480px;
        ">

          <!-- Hero sunset image -->
          <tr>
            <td class="hero-img" style="
              height: 220px;
              background-image: url('{{background_url}}');
              background-size: cover;
              background-position: center 40%;
              background-color: #d4935c;
            " valign="bottom">
              <!--[if gte mso 9]>
              <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:480px;height:220px;">
                <v:fill type="tile" src="{{background_url}}" color="#d4935c" />
                <v:textbox inset="0,0,0,0">
              <![endif]-->
              <div style="height: 220px;"></div>
              <!--[if gte mso 9]>
                </v:textbox>
              </v:rect>
              <![endif]-->
            </td>
          </tr>

          <!-- Warm gradient transition strip -->
          <tr>
            <td style="
              height: 4px;
              background: linear-gradient(90deg, #e8a87c 0%, #d4785c 35%, #c4967a 65%, #e8c4a0 100%);
            "></td>
          </tr>

          <!-- Card body -->
          <tr>
            <td class="card-bg" style="background-color: #fdf8f4;">

              <!-- Header: brand + location pill -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td class="card-inner" style="padding: 28px 32px 0;">

                    <!-- Brand name -->
                    <p class="brand-text" style="
                      margin: 0 0 16px;
                      font-family: Georgia, 'Times New Roman', serif;
                      font-size: 22px;
                      font-weight: 400;
                      color: #8b6244;
                      letter-spacing: 0.02em;
                    ">Look West</p>

                    <!-- Location + sunset time row -->
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <!-- Location pill -->
                        <td class="pill-bg" style="
                          background-color: #f0e0d0;
                          border-radius: 20px;
                          padding: 6px 14px;
                        ">
                          <span class="pill-text" style="
                            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                            font-size: 13px;
                            color: #996b4a;
                            white-space: nowrap;
                          ">&#128205; {{location}}</span>
                        </td>

                        <td style="width: 8px;"></td>

                        <!-- Sunset time pill -->
                        <td class="pill-bg" style="
                          background-color: #f0e0d0;
                          border-radius: 20px;
                          padding: 6px 14px;
                        ">
                          <span class="pill-text" style="
                            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                            font-size: 13px;
                            color: #996b4a;
                            white-space: nowrap;
                          ">&#127749; {{sunset_time}}</span>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>

              <!-- Message body -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td class="card-inner" style="padding: 24px 32px 28px;">
                    <p class="message-text" style="
                      margin: 0;
                      font-family: Georgia, 'Times New Roman', serif;
                      font-size: 17px;
                      line-height: 1.75;
                      color: #4a3728;
                    ">{{message}}</p>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td class="card-inner" style="padding: 0 32px;">
                    <div class="divider" style="height: 1px; background-color: #ecddd0;"></div>
                  </td>
                </tr>
              </table>

              <!-- Footer -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td class="card-inner" style="padding: 18px 32px 24px;">
                    <p class="footer-text" style="
                      margin: 0;
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                      font-size: 12px;
                      color: #b8a090;
                      line-height: 1.6;
                    ">
                      You signed up for sunset alerts at <a href="https://golookwest.com" style="color: #b8a090; text-decoration: underline;">golookwest.com</a>.
                      <a href="{{unsubscribe_url}}" style="color: #b8a090; text-decoration: underline;">Unsubscribe</a>
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

        </table>
        <!-- End card -->

      </td>
    </tr>
  </table>

</body>
</html>
